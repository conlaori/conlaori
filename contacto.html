<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hablemos — Orianna</title>
  <link rel="icon" type="image/png" href="RECURSOS/FAVICON/Recurso 39.png">
  <link rel="stylesheet" href="responsive.css">
  <style>

    @font-face {
      font-family: 'AlteHaasGrotesk';
      src: url('RECURSOS/fonts/alte_haas_grotesk/AlteHaasGroteskRegular.ttf') format('truetype');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'AlteHaasGrotesk';
      src: url('RECURSOS/fonts/alte_haas_grotesk/AlteHaasGroteskBold.ttf') format('truetype');
      font-weight: 700; font-style: normal;
    }
    @font-face {
      font-family: 'BehindTheNineties';
      src: url('RECURSOS/fonts/behind-the-nineties-90s-80s-perfectly-retro-2024-12-16-06-34-55-utc/TTF/UPRIGHT/Behind-The-Nineties-Rg.ttf') format('truetype');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'BehindTheNineties';
      src: url('RECURSOS/fonts/behind-the-nineties-90s-80s-perfectly-retro-2024-12-16-06-34-55-utc/TTF/ITALIC/Behind-The-Nineties-It.ttf') format('truetype');
      font-weight: 400; font-style: italic;
    }

    * { box-sizing: border-box; }

    nav a { transition: opacity 0.2s ease; }
    nav a:hover { opacity: 0.5; }
    footer a { letter-spacing: -0.04em; transition: opacity 0.2s ease; }
    footer a:hover { opacity: 0.5; }

    .form-group { margin-bottom: 2rem; }

    .form-group label {
      display: block;
      font-family: 'AlteHaasGrotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: #262626;
      margin-bottom: 0.5rem;
    }

    .form-group input,
    .form-group textarea {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      border-top: 1px solid #262626;
      padding: 0.55rem 0 0.2rem 0;
      font-family: 'AlteHaasGrotesk', sans-serif;
      font-size: 1rem;
      color: #b07245;
      outline: none;
      resize: none;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #b07245;
      opacity: 1;
    }

    .form-group textarea { height: 3rem; }

    .btn-enviar { transition: transform 0.35s ease; }
    .btn-enviar:hover { transform: scale(1.04); }

  </style>
</head>
<body style="background-color: #f8f6e9; margin: 0; padding: 0; overflow-x: hidden; cursor: url('cursor.png'), auto;">

  <!-- NAV -->
  <nav style="position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.5rem 2.75rem; display: flex; align-items: center; justify-content: space-between;">
    <a href="index.html">
      <img src="RECURSOS/img/icono-rojo.png" alt="Orianna" style="height: 2.8rem; width: auto;">
    </a>
    <div class="nav-links" style="display: flex; align-items: center; gap: 2.75rem;">
      <a href="proyectos.html" style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.125rem; color: #262626; text-decoration: none; font-weight: 400;">Proyectos</a>
      <a href="sobre-mi.html"  style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.125rem; color: #262626; text-decoration: none; font-weight: 400;">Sobre mí</a>
      <a href="contacto.html"  style="font-family: 'BehindTheNineties', serif; font-size: 1.125rem; font-style: italic; color: #262626; text-decoration: none; font-weight: 400;">Hablemos</a>
    </div>
    <button class="nav-burger" aria-label="Menú" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Menú móvil -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="proyectos.html">Proyectos</a>
    <a href="sobre-mi.html">Sobre mí</a>
    <a href="contacto.html" class="nav-active">Hablemos</a>
  </div>

  <!-- MAIN -->
  <section id="contacto-section" style="position: relative; z-index: 1; min-height: 100vh; background-color: #f8f6e9;">

    <!-- Fondo de puntos — izquierda más estrecha -->
    <div id="contacto-dots" style="position: absolute; top: 0; left: 0; width: 33%; height: 100%; background-image: radial-gradient(circle, #c3bfb0 1px, transparent 1px); background-size: 18px 18px; border-right: 1px solid #d0ccbe; pointer-events: none;"></div>

    <!-- Teléfono — centrado en la línea, más grande, fonde en el footer -->
    <img id="contacto-telefono" src="img/CONTACTO/telefono.png" alt=""
         style="position: absolute; left: 33%; transform: translateX(-50%); top: 8vh; width: 36vw; z-index: 2; pointer-events: none;">

    <!-- Formulario — derecha -->
    <div id="contacto-form-container" style="position: relative; z-index: 3; min-height: 100vh; display: flex; align-items: center; padding-left: 50%; padding-right: 5vw; padding-top: 8vw; padding-bottom: 6vw;">
      <div style="width: 100%; max-width: 480px;">

        <h1 style="font-family: 'BehindTheNineties', serif; font-size: 4.5vw; font-weight: 400; font-style: normal; color: #262626; margin: 0 0 3vw 0; line-height: 1;">Contacto</h1>

        <form>
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" placeholder="Maria López">
          </div>

          <div class="form-group">
            <label>E-mail</label>
            <input type="email" placeholder="maria@gmail.com">
          </div>

          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" placeholder="+58 414 000 0000">
          </div>

          <div class="form-group">
            <label>Mensaje</label>
            <textarea placeholder="Comparte tus dudas o los detalles de tu proyecto aquí."></textarea>
          </div>

          <div style="padding-top: 1.5vw; text-align: left;">
            <button id="btn-enviar" type="submit" style="background: none; border: none; cursor: pointer; padding: 0; font-family: 'BehindTheNineties', serif; font-size: 1.45rem; font-weight: 400; font-style: normal; color: #262626; transition: color 0.2s ease;">Enviar</button>
          </div>
        </form>

      </div>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer-wrap" style="background: #fcc302; padding: 5vw 0 5vw 7vw; position: relative; z-index: 5;">
    <div class="footer-inner" style="display: flex; gap: 6vw; align-items: flex-start;">
      <div style="display: flex; flex-direction: column; gap: 0.5vw;">
        <a href="https://www.linkedin.com/in/orianna-zambrano/" target="_blank" rel="noopener" style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.2rem; color: #262626; text-decoration: none;">Linkdln</a>
        <a href="https://www.instagram.com/conlaori/" target="_blank" rel="noopener" style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.2rem; color: #262626; text-decoration: none;">Instagram</a>
        <a href="https://www.tiktok.com/@conlaori" target="_blank" rel="noopener" style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.2rem; color: #262626; text-decoration: none;">Tik Tok</a>
      </div>
      <div style="display: flex; flex-direction: column; gap: 0.5vw;">
        <a href="proyectos.html" style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.2rem; color: #262626; text-decoration: none;">Proyectos</a>
        <a href="sobre-mi.html"  style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.2rem; color: #262626; text-decoration: none;">Sobre mí</a>
      </div>
      <div>
        <a href="contacto.html" style="font-family: 'AlteHaasGrotesk', sans-serif; font-size: 1.2rem; color: #262626; text-decoration: none;">Hablemos</a>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('btn-enviar').addEventListener('click', function() {
      this.style.color = '#c73f3f';
    });
  </script>
  <script src="responsive.js"></script>

</body>
</html>
